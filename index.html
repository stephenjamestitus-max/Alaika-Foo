<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    margin-top: 40px;
    color: red;
    font-size: 3rem;
    text-shadow: 0 0 20px red;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 25px crimson; }
  }

  .gallery {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
  }

  .gallery img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 15px;
    border: 2px solid red;
    transition: transform 1s ease, box-shadow 0.5s;
    animation: floatImages 6s ease-in-out infinite alternate;
  }

  .gallery img:hover {
    transform: scale(1.2) rotate(-3deg);
    box-shadow: 0 0 30px red;
  }

  @keyframes floatImages {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  p {
    font-size: 2rem;
    color: #ff4d4d;
    margin-top: 40px;
    animation: fadeIn 3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  audio {
    margin-top: 30px;
    filter: invert(1);
  }

  /* floating hearts */
  .heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh); opacity:1; }
    100% { transform: translateY(-10vh); opacity:0; }
  }
</style>
</head>

<body>
<h1>For You ❤️</h1>

<div class="gallery">
  <img src="img_9285.jpg.jpg">
  <img src="img_9286.jpg.jpg">
  <img src="img_9287.jpg.jpg">
</div>

<p>I love you like a lot Alaika ❤️</p>

<audio controls loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  // floating hearts generator
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
  }, 400);

  // subtle background particles
  for(let i=0;i<30;i++){
    const particle = document.createElement("div");
    particle.style.position="absolute";
    particle.style.width="4px";
    particle.style.height="4px";
    particle.style.background="red";
    particle.style.borderRadius="50%";
    particle.style.left=Math.random()*100+"vw";
    particle.style.top=Math.random()*100+"vh";
    particle.style.opacity=Math.random();
    particle.style.animation=`particleFloat ${5+Math.random()*5}s linear infinite`;
    document.body.appendChild(particle);
  }

</script>

<style>
@keyframes particleFloat {
  0% { transform: translateY(0px); opacity: 0.3;}
  50% { transform: translateY(-50px) rotate(180deg); opacity: 1;}
  100% { transform: translateY(0px); opacity: 0.3;}
}
</style>

</body>
</html>
